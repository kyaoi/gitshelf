name: release-smoke

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "tag to smoke test (for example v1.2.0, v1.3.0, or latest)"
        required: true
        default: latest

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      target_version: ${{ steps.meta.outputs.target_version }}
      module_version: ${{ steps.meta.outputs.module_version }}
      exact_module_install: ${{ steps.meta.outputs.exact_module_install }}
    steps:
      - name: Resolve target version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            target_version="${GITHUB_REF_NAME}"
          else
            target_version="${{ inputs.version }}"
          fi

          exact_module_install=false
          module_version="${target_version}"
          if [[ "${target_version}" == "latest" ]]; then
            exact_module_install=true
          elif [[ "${target_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            exact_module_install=true
          else
            module_version=""
          fi

          printf 'target_version=%s\n' "${target_version}" >> "${GITHUB_OUTPUT}"
          printf 'module_version=%s\n' "${module_version}" >> "${GITHUB_OUTPUT}"
          printf 'exact_module_install=%s\n' "${exact_module_install}" >> "${GITHUB_OUTPUT}"

  install-smoke:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Smoke test exact module install
        if: needs.prepare.outputs.exact_module_install == 'true'
        shell: bash
        env:
          TARGET_VERSION: ${{ needs.prepare.outputs.target_version }}
          MODULE_VERSION: ${{ needs.prepare.outputs.module_version }}
        run: |
          export GOBIN="${RUNNER_TEMP}/go-bin"
          mkdir -p "${GOBIN}"
          export PATH="${GOBIN}:${PATH}"

          go install "github.com/kyaoi/gitshelf/cmd/shelf@${MODULE_VERSION}"
          installed_version="$(shelf --version)"
          echo "go install reported version: ${installed_version}"

          if [[ "${TARGET_VERSION}" == "latest" ]]; then
            [[ "${installed_version}" != "dev" ]]
          else
            [[ "${installed_version}" == "${TARGET_VERSION}" ]]
          fi

      - name: Smoke test checked-out tag build for legacy short tags
        if: needs.prepare.outputs.exact_module_install != 'true'
        shell: bash
        env:
          TARGET_VERSION: ${{ needs.prepare.outputs.target_version }}
        run: |
          export GOBIN="${RUNNER_TEMP}/go-bin"
          mkdir -p "${GOBIN}"
          go build -ldflags "-X main.version=${TARGET_VERSION}" -o "${GOBIN}/shelf" ./cmd/shelf
          installed_version="$("${GOBIN}/shelf" --version)"
          echo "checked-out build reported version: ${installed_version}"
          [[ "${installed_version}" == "${TARGET_VERSION}" ]]

      - name: Install mise
        if: needs.prepare.outputs.exact_module_install == 'true'
        shell: bash
        run: |
          curl https://mise.run | sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.local/share/mise/shims" >> "${GITHUB_PATH}"

      - name: Smoke test mise latest install
        if: needs.prepare.outputs.exact_module_install == 'true'
        shell: bash
        run: |
          mise use -g go:github.com/kyaoi/gitshelf/cmd/shelf@latest
          installed_version="$(shelf --version)"
          echo "mise latest reported version: ${installed_version}"
          [[ "${installed_version}" != "dev" ]]
