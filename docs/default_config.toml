# gitshelf config
kinds = ["todo", "idea", "memo", "inbox"]
statuses = ["open", "in_progress", "blocked", "done", "cancelled"]
default_kind = "todo"
default_status = "open"

[link_types]
names = ["depends_on", "related"]
blocking = "depends_on"

[commands.calendar]
default_range_unit = "days"
default_days = 7
default_months = 6
default_years = 2

[commands.cockpit]
copy_separator = "\n"
post_exit_git_action = "none"
commit_message = "chore: update shelf data"
